<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Logo system</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row-l { display: grid; grid-template-columns: 0.7fr 1.5fr 1.5fr; gap: 12px; align-items: stretch; }
  .panel { border: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; min-height: 110px; background: #fff; }
  .panel.dark { background: #000; color: #fff; border-color: #000; }
  .panel.dark .lbl { color: rgba(255,255,255,0.55); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--fg-3); text-transform: uppercase; }
  .panel img { display: block; max-width: 100%; max-height: 64px; object-fit: contain; }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Logo system</span>
    <span class="eyebrow">icon · wordmark · light + dark</span>
  </div>
  <div class="row-l">
    <div class="panel">
      <img src="../assets/icon-black.png" alt="bitsandbytes icon" style="height:64px; width:auto;"/>
      <span class="lbl">Icon · light</span>
    </div>
    <div class="panel">
      <img src="../assets/logo-light.png" alt="bitsandbytes wordmark"/>
      <span class="lbl">Wordmark · light</span>
    </div>
    <div class="panel dark">
      <img src="../assets/logo-dark.png" alt="bitsandbytes wordmark reversed"/>
      <span class="lbl">Wordmark · dark</span>
    </div>
  </div>
</div>
</body>
</html>
