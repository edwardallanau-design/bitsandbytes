<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<title>Grayscale ramp — dark</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .stop { display: flex; flex-direction: column; gap: 4px; }
  .chip { aspect-ratio: 1; border: 1px solid var(--border); }
  .stop .name { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; color: var(--fg-3); text-align: center; }
  .stop .hex { font-family: var(--font-mono); font-size: 9px; color: var(--fg-2); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Grayscale ramp · Dark</span>
    <span class="eyebrow">Same 11 stops · inverted use</span>
  </div>
  <div class="ramp">
    <div class="stop"><div class="chip" style="background:#000000"></div><div class="name">10</div><div class="hex">000</div></div>
    <div class="stop"><div class="chip" style="background:#1a1a1a"></div><div class="name">9</div><div class="hex">1A1A1A</div></div>
    <div class="stop"><div class="chip" style="background:#2e2e2e"></div><div class="name">8</div><div class="hex">2E2E2E</div></div>
    <div class="stop"><div class="chip" style="background:#5a5a5a"></div><div class="name">7</div><div class="hex">5A5A5A</div></div>
    <div class="stop"><div class="chip" style="background:#888888"></div><div class="name">6</div><div class="hex">888</div></div>
    <div class="stop"><div class="chip" style="background:#b8b8b8"></div><div class="name">5</div><div class="hex">B8B8B8</div></div>
    <div class="stop"><div class="chip" style="background:#d8d8d8"></div><div class="name">4</div><div class="hex">D8D8D8</div></div>
    <div class="stop"><div class="chip" style="background:#ebebeb"></div><div class="name">3</div><div class="hex">EBEBEB</div></div>
    <div class="stop"><div class="chip" style="background:#f4f4f4"></div><div class="name">2</div><div class="hex">F4F4F4</div></div>
    <div class="stop"><div class="chip" style="background:#fafafa"></div><div class="name">1</div><div class="hex">FAFAFA</div></div>
    <div class="stop"><div class="chip" style="background:#ffffff"></div><div class="name">0</div><div class="hex">FFF</div></div>
  </div>
</div>
</body>
</html>
