<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Links & navigation</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .nav { display: flex; align-items: center; gap: 28px; padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .nav a { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2); text-decoration: none; padding: 4px 0; border-bottom: 1px solid transparent; }
  .nav a:hover { color: var(--fg-1); border-bottom-color: var(--fg-1); }
  .nav a.active { color: var(--fg-1); border-bottom-color: var(--fg-1); }
  .nav .num { color: var(--fg-3); margin-right: 6px; }
  .links { display: flex; gap: 28px; flex-wrap: wrap; }
  .links a { color: var(--fg-1); text-decoration: none; border-bottom: 1px solid var(--fg-1); padding-bottom: 1px; font-size: 14px; }
  .links a.subtle { border-bottom-color: var(--border); color: var(--fg-2); }
  .links a:hover { border-bottom-color: var(--fg-1); color: var(--fg-1); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--fg-3); text-transform: uppercase; }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Links & nav</span>
    <span class="eyebrow">underline = link</span>
  </div>
  <span class="lbl">Top nav</span>
  <nav class="nav">
    <a class="active"><span class="num">01</span>Index</a>
    <a><span class="num">02</span>Work</a>
    <a><span class="num">03</span>About</a>
    <a><span class="num">04</span>Journal</a>
  </nav>
  <span class="lbl">Inline links</span>
  <div class="links">
    <a>Read the case study</a>
    <a class="subtle">View on GitHub</a>
    <a>hello@bitsandbytes.studio</a>
  </div>
</div>
</body>
</html>
