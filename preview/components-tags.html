<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Tags & badges</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px; border: 1px solid var(--border); color: var(--fg-2); display: inline-flex; align-items: center; gap: 6px; }
  .tag.solid { background: var(--fg-1); color: var(--bg); border-color: var(--fg-1); }
  .tag.pill { border-radius: 999px; }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .row-t { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--fg-3); text-transform: uppercase; }
  .grp { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Tags & badges</span>
    <span class="eyebrow">monospace · uppercase</span>
  </div>
  <div class="grp"><span class="lbl">Categories</span><div class="row-t">
    <span class="tag">Case study</span>
    <span class="tag">Engineering</span>
    <span class="tag">2025</span>
    <span class="tag solid">Featured</span>
  </div></div>
  <div class="grp"><span class="lbl">Status pills</span><div class="row-t">
    <span class="tag pill"><span class="dot"></span>Live</span>
    <span class="tag pill"><span class="dot" style="opacity:0.4"></span>Draft</span>
    <span class="tag pill"><span class="dot"></span>v1.2.0</span>
  </div></div>
</div>
</body>
</html>
