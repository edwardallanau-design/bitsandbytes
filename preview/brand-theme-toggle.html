<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Theme — light/dark</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 0; }
  .card { padding: 0; flex-direction: row; gap: 0; min-height: 0; }
  .pane { flex: 1; padding: 24px 28px; display: flex; flex-direction: column; gap: 12px; min-height: 220px; }
  .pane.light { background: #ffffff; color: #000000; }
  .pane.dark { background: #000000; color: #ffffff; }
  .pane h1 { font-family: var(--font-display); font-style: italic; font-size: 36px; margin: 0; letter-spacing: -0.02em; }
  .pane p { margin: 0; font-size: 13px; opacity: 0.75; line-height: 1.5; }
  .pane .eb { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.6; }
  .pane .btns { display: flex; gap: 8px; margin-top: auto; }
  .pane button { font-family: var(--font-sans); font-size: 12px; padding: 8px 14px; cursor: pointer; line-height: 1; }
  .pane.light .btn-1 { background: #000; color: #fff; border: 1px solid #000; }
  .pane.light .btn-2 { background: transparent; color: #000; border: 1px solid #000; }
  .pane.dark .btn-1 { background: #fff; color: #000; border: 1px solid #fff; }
  .pane.dark .btn-2 { background: transparent; color: #fff; border: 1px solid #fff; }
</style>
</head>
<body>
<div class="card">
  <div class="pane light">
    <span class="eb">Theme · Light</span>
    <h1>Ship better<br/>software.</h1>
    <p>Paper-white canvas. Ink-black type. Hairline borders.</p>
    <div class="btns"><button class="btn-1">Get in touch</button><button class="btn-2">Read more</button></div>
  </div>
  <div class="pane dark">
    <span class="eb">Theme · Dark</span>
    <h1>Ship better<br/>software.</h1>
    <p>True black canvas. Off-white type. Same tokens, inverted.</p>
    <div class="btns"><button class="btn-1">Get in touch</button><button class="btn-2">Read more</button></div>
  </div>
</div>
</body>
</html>
