<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Type scale</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .scale-row { display: grid; grid-template-columns: 80px 60px 1fr; gap: 12px; align-items: baseline; padding: 4px 0; border-top: 1px solid var(--border); }
  .scale-row:first-child { border-top: 0; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fg-3); }
  .size { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Type scale</span>
    <span class="eyebrow">11 steps</span>
  </div>
  <div style="margin-top: 4px;">
    <div class="scale-row"><span class="label">display lg</span><span class="size">96</span><span style="font-family: var(--font-display); font-size: 36px; line-height: 1; font-style: italic;">Ship better</span></div>
    <div class="scale-row"><span class="label">display md</span><span class="size">72</span><span style="font-family: var(--font-display); font-size: 30px; line-height: 1; font-style: italic;">Ship better</span></div>
    <div class="scale-row"><span class="label">h1</span><span class="size">44</span><span style="font-size: 22px; font-weight: 600; letter-spacing: -0.01em;">Recent work</span></div>
    <div class="scale-row"><span class="label">h2</span><span class="size">32</span><span style="font-size: 18px; font-weight: 600;">Recent work</span></div>
    <div class="scale-row"><span class="label">h3</span><span class="size">24</span><span style="font-size: 16px; font-weight: 600;">Recent work</span></div>
    <div class="scale-row"><span class="label">body lg</span><span class="size">18</span><span style="font-size: 15px;">A studio that ships.</span></div>
    <div class="scale-row"><span class="label">body</span><span class="size">15</span><span style="font-size: 14px;">A studio that ships.</span></div>
    <div class="scale-row"><span class="label">body sm</span><span class="size">13</span><span style="font-size: 12px; color: var(--fg-2);">A studio that ships.</span></div>
    <div class="scale-row"><span class="label">mono</span><span class="size">12</span><span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em;">a-studio-that-ships</span></div>
    <div class="scale-row"><span class="label">eyebrow</span><span class="size">11</span><span class="eyebrow">CASE STUDY · 04</span></div>
  </div>
</div>
</body>
</html>
