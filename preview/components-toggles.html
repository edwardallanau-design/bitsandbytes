<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Toggles & switches</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grp { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--fg-3); text-transform: uppercase; }
  .row-c { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  /* Switch */
  .switch { position: relative; width: 36px; height: 20px; border: 1px solid var(--border); border-radius: 999px; cursor: pointer; background: var(--bg); }
  .switch.on { background: var(--fg-1); border-color: var(--fg-1); }
  .switch .knob { position: absolute; top: 1px; left: 1px; width: 16px; height: 16px; border-radius: 999px; background: var(--fg-1); transition: all 150ms cubic-bezier(0.2,0,0,1); }
  .switch.on .knob { background: var(--bg); transform: translateX(16px); }
  /* Checkbox */
  .check { width: 16px; height: 16px; border: 1px solid var(--border); border-radius: 2px; display: inline-flex; align-items: center; justify-content: center; }
  .check.on { background: var(--fg-1); border-color: var(--fg-1); color: var(--bg); }
  /* Segmented */
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .seg button { font-family: var(--font-sans); font-size: 12px; padding: 6px 12px; background: transparent; color: var(--fg-2); border: 0; border-right: 1px solid var(--border); cursor: pointer; }
  .seg button:last-child { border-right: 0; }
  .seg button.active { background: var(--fg-1); color: var(--bg); }
  .pair { display: inline-flex; gap: 8px; align-items: center; font-size: 13px; color: var(--fg-1); }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Toggles & switches</span>
    <span class="eyebrow">switch · checkbox · segmented</span>
  </div>
  <div class="grp"><span class="lbl">Switches</span><div class="row-c">
    <span class="pair"><span class="switch"><span class="knob"></span></span> Off</span>
    <span class="pair"><span class="switch on"><span class="knob"></span></span> On</span>
  </div></div>
  <div class="grp"><span class="lbl">Checkboxes</span><div class="row-c">
    <span class="pair"><span class="check"></span> Send a copy</span>
    <span class="pair"><span class="check on">&check;</span> Subscribe</span>
  </div></div>
  <div class="grp"><span class="lbl">Segmented</span><div class="row-c">
    <div class="seg"><button class="active">All</button><button>Engineering</button><button>Design</button></div>
  </div></div>
</div>
</body>
</html>
