<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Semantic tokens — light</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .tok { border: 1px solid var(--border); padding: 12px; min-height: 88px; display: flex; flex-direction: column; justify-content: space-between; }
  .tok .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; color: var(--fg-2); text-transform: lowercase; }
  .tok .desc { font-size: 11px; color: var(--fg-3); }
  .tok.fg-1 { background: var(--fg-1); color: var(--bg); }
  .tok.fg-1 .name, .tok.fg-1 .desc { color: rgba(255,255,255,0.65); }
  .tok.bg-elev { background: var(--bg-elev); }
  .tok.fill-2 { background: var(--fill-2); }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Semantic tokens · Light</span>
    <span class="eyebrow">surface, fg, fill</span>
  </div>
  <div class="grid">
    <div class="tok"><div>Aa</div><div><div class="name">--bg</div><div class="desc">Page</div></div></div>
    <div class="tok bg-elev"><div>Aa</div><div><div class="name">--bg-elev</div><div class="desc">Inset surface</div></div></div>
    <div class="tok fill-2"><div>Aa</div><div><div class="name">--fill-2</div><div class="desc">Subtle pill</div></div></div>
    <div class="tok fg-1"><div>Aa</div><div><div class="name">--fill-1</div><div class="desc">Primary fill</div></div></div>
    <div class="tok"><div style="color: var(--fg-1); font-weight:600;">Primary</div><div><div class="name">--fg-1</div><div class="desc">Strong text</div></div></div>
    <div class="tok"><div style="color: var(--fg-2);">Secondary</div><div><div class="name">--fg-2</div><div class="desc">Body / meta</div></div></div>
    <div class="tok"><div style="color: var(--fg-3);">Tertiary</div><div><div class="name">--fg-3</div><div class="desc">Captions</div></div></div>
    <div class="tok" style="border-color: var(--border-strong)"><div>Aa</div><div><div class="name">--border-strong</div><div class="desc">Hairline · focus</div></div></div>
  </div>
</div>
</body>
</html>
