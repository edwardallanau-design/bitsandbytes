<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Iconography — Lucide</title>
<link rel="stylesheet" href="_card.css"/>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<style>
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; gap: 6px; align-items: center; padding: 10px 6px; border: 1px solid var(--border); }
  .cell svg { width: 22px; height: 22px; stroke: var(--fg-1); stroke-width: 1.5; }
  .cell .name { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Iconography · Lucide</span>
    <span class="eyebrow">1.5 px stroke · 24 px box</span>
  </div>
  <div class="grid">
    <div class="cell"><i data-lucide="arrow-up-right"></i><span class="name">arrow</span></div>
    <div class="cell"><i data-lucide="circle"></i><span class="name">circle</span></div>
    <div class="cell"><i data-lucide="square"></i><span class="name">square</span></div>
    <div class="cell"><i data-lucide="layers"></i><span class="name">layers</span></div>
    <div class="cell"><i data-lucide="terminal"></i><span class="name">terminal</span></div>
    <div class="cell"><i data-lucide="git-branch"></i><span class="name">git</span></div>
    <div class="cell"><i data-lucide="folder"></i><span class="name">folder</span></div>
    <div class="cell"><i data-lucide="file-text"></i><span class="name">file</span></div>
    <div class="cell"><i data-lucide="search"></i><span class="name">search</span></div>
    <div class="cell"><i data-lucide="settings"></i><span class="name">settings</span></div>
    <div class="cell"><i data-lucide="user"></i><span class="name">user</span></div>
    <div class="cell"><i data-lucide="mail"></i><span class="name">mail</span></div>
    <div class="cell"><i data-lucide="calendar"></i><span class="name">calendar</span></div>
    <div class="cell"><i data-lucide="clock"></i><span class="name">clock</span></div>
    <div class="cell"><i data-lucide="moon"></i><span class="name">moon</span></div>
    <div class="cell"><i data-lucide="sun"></i><span class="name">sun</span></div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
