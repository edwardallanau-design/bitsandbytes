<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row-r { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; flex: 1; }
  .box { width: 100%; height: 64px; border: 1px solid var(--border); background: var(--bg-elev); }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--fg-2); text-transform: uppercase; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Corner radii</span>
    <span class="eyebrow">Default: square</span>
  </div>
  <div class="row-r">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="lbl">radius-0</div><div class="val">0 px</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">radius-1</div><div class="val">2 px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">radius-2</div><div class="val">4 px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">radius-3</div><div class="val">8 px</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">radius-pill</div><div class="val">999 px</div></div>
  </div>
  <div style="font-size: 12px; color: var(--fg-3);">Cards and large surfaces use <span style="font-family: var(--font-mono);">radius-0</span>. Inputs and chips use <span style="font-family: var(--font-mono);">radius-2</span>. Pills are reserved for status badges.</div>
</div>
</body>
</html>
