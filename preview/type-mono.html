<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Mono type</title>
<link rel="stylesheet" href="_card.css"/>
</head>
<body>
<div class="card">

    <span class="eyebrow">Mono · JetBrains Mono</span>

    <span class="eyebrow">CURRENTLY</span>
    <span class="eyebrow">READ TIME · 4 MIN</span>

</div>

</html>
