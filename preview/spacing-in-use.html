<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Spacing in use</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .demo { border: 1px solid var(--border); padding: 32px; display: flex; flex-direction: column; gap: 24px; }
  .demo h3 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .demo p { margin: 0; color: var(--fg-2); font-size: 14px; line-height: 1.55; max-width: 56ch; }
  .demo .meta { display: flex; gap: 16px; }
  .pill { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 8px; border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Spacing in use</span>
    <span class="eyebrow">Generous whitespace</span>
  </div>
  <div class="demo">
    <div class="meta">
      <span class="pill">Case study</span>
      <span class="pill">2025</span>
    </div>
    <h3>Voltline — designing the operator console</h3>
    <p>A six-month engagement with the Voltline grid team. We rebuilt the operator console from the routing layer up, focused on speed of decision and zero-latency interactions for the night shift.</p>
  </div>
</div>
</body>
</html>
