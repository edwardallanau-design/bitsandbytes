<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Spacing scale</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .row-s { display: grid; grid-template-columns: 60px 50px 1fr; gap: 12px; align-items: center; padding: 4px 0; border-top: 1px solid var(--border); }
  .row-s:first-of-type { border-top: 0; }
  .name { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2); }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .bar { height: 14px; background: var(--fg-1); }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Spacing scale</span>
    <span class="eyebrow">4 px base · 10 steps</span>
  </div>
  <div>
    <div class="row-s"><span class="name">s-1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
    <div class="row-s"><span class="name">s-2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
    <div class="row-s"><span class="name">s-3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
    <div class="row-s"><span class="name">s-4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
    <div class="row-s"><span class="name">s-5</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
    <div class="row-s"><span class="name">s-6</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
    <div class="row-s"><span class="name">s-7</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
    <div class="row-s"><span class="name">s-8</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
    <div class="row-s"><span class="name">s-9</span><span class="px">96</span><div class="bar" style="width:96px"></div></div>
    <div class="row-s"><span class="name">s-10</span><span class="px">128</span><div class="bar" style="width:128px"></div></div>
  </div>
</div>
</body>
</html>
