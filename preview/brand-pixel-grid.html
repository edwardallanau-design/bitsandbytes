<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Pixel grid motif</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .canvas { position: relative; flex: 1; min-height: 220px; border: 1px solid var(--border); padding: 28px; overflow: hidden; background-image: radial-gradient(rgba(0,0,0,0.08) 1px, transparent 1px); background-size: 24px 24px; }
  .canvas h1 { font-family: var(--font-display); font-style: italic; font-size: 56px; line-height: 1; margin: 0; letter-spacing: -0.02em; }
  .canvas .sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-top: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Pixel-grid motif</span>
    <span class="eyebrow">1 px dots · 24 px grid · 6 % opacity</span>
  </div>
  <div class="canvas">
    <h1>A studio<br/>that ships.</h1>
    <div class="sub">Brooklyn · est. 2024</div>
  </div>
</div>
</body>
</html>
