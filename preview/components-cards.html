<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8"/>
<title>Cards</title>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .work-card { border: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 16px; transition: border-color 150ms cubic-bezier(0.2,0,0,1); }
  .work-card:hover { border-color: var(--border-strong); }
  .meta { display: flex; gap: 12px; align-items: center; }
  .meta .num { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--fg-3); text-transform: uppercase; }
  .meta .yr { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--fg-3); }
  h3 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  p { margin: 0; color: var(--fg-2); font-size: 13px; line-height: 1.5; }
  .arrow { margin-top: 4px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
</style>
</head>
<body>
<div class="card">
  <div class="spread">
    <span class="eyebrow">Cards</span>
    <span class="eyebrow">square · hairline · no shadow</span>
  </div>
  <div class="grid">
    <a class="work-card">
      <div class="meta"><span class="num">01</span><span class="yr">2025</span></div>
      <h3>Voltline operator console</h3>
      <p>Rebuilt the night-shift dispatch tool. Fewer clicks, faster decisions.</p>
      <div class="arrow">Read &rarr;</div>
    </a>
    <a class="work-card">
      <div class="meta"><span class="num">02</span><span class="yr">2024</span></div>
      <h3>Field — a labels app</h3>
      <p>Pricing, inventory, and label printing for small craft producers.</p>
      <div class="arrow">Read &rarr;</div>
    </a>
  </div>
</div>
</body>
</html>
